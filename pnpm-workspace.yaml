packages:
  - "apps/*"
  - "packages/*"

# ⚠️ SECURITY: Only trusted dependencies may run install-time scripts (native binaries, etc.).
# approve-builds with no selection set these to false and blocked installs — use true after you review the package.
allowBuilds:
  esbuild: true
  sharp: true
  unrs-resolver: true

# Kept for clarity / older pnpm tooling; primary control in this repo is allowBuilds above.
onlyBuiltDependencies:
  - esbuild
  - sharp
  - unrs-resolver
